[package]
description = "Bloodborne Attack Rating calculator"
edition     = "2024"
license     = "MIT OR Apache-2.0"
name        = "bb-calc"
repository  = "https://github.com/jhickey/bb-calc"
version     = "0.2.0"

exclude = ["data/saves/*"]

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }

[build-dependencies]
serde      = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
